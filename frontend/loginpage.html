<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Career Guidance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta http-equiv="Content-Security-Policy" content="default-src *; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline';">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background:
                radial-gradient(ellipse at 10% 20%, rgba(59,130,246,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(59,130,246,0.07) 0%, transparent 50%),
                #080d1a;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes glowPulse {
            0%,100% { box-shadow: 0 0 16px rgba(59,130,246,0.3), 0 4px 16px rgba(0,0,0,0.4); }
            50%     { box-shadow: 0 0 32px rgba(59,130,246,0.55),0 4px 16px rgba(0,0,0,0.4); }
        }
        .card {
            animation: fadeInUp 0.65s ease both;
            background: linear-gradient(145deg, rgba(18,18,30,0.98), rgba(14,20,36,0.98));
            border: 1px solid rgba(59,130,246,0.2);
            box-shadow: 0 4px 50px rgba(0,0,0,0.5), 0 0 25px rgba(59,130,246,0.05);
        }
        .grad-text {
            background: linear-gradient(135deg, #3b82f6, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .inp {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            border-radius: 12px;
            padding: 13px 16px 13px 44px;
            font-size: 0.9rem;
            transition: all 0.25s;
        }
        .inp:focus {
            outline: none;
            border-color: rgba(59,130,246,0.5);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
            background: rgba(59,130,246,0.04);
        }
        .inp::placeholder { color: rgba(255,255,255,0.22); }
        .inp-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
            pointer-events: none;
        }
        .btn-primary {
            background: #3b82f6;
            animation: glowPulse 2.5s ease-in-out infinite;
            transition: transform 0.2s, background 0.2s;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            color: white;
            border: none;
            cursor: pointer;
        }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-primary:active { transform: translateY(0); }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="py-4 px-6" style="background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(59,130,246,0.12);">
        <a href="index.html" class="inline-flex items-center gap-3 hover:opacity-80 transition-opacity">
            <div class="w-9 h-9 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                <i class="fas fa-compass text-white text-sm"></i>
            </div>
            <span class="font-extrabold text-white tracking-tight">Career Guidance System</span>
        </a>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="card rounded-2xl p-10 w-full max-w-md">

            <!-- Card header -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background:rgba(59,130,246,0.12);">
                    <i class="fas fa-lock text-blue-400 text-2xl"></i>
                </div>
                <h2 class="text-3xl font-black grad-text">Welcome Back</h2>
                <p class="text-gray-500 mt-2 text-sm">Sign in to your student account</p>
            </div>

            <!-- Fields -->
            <div class="space-y-4 mb-6">
                <div>
                    <label class="text-gray-400 text-sm font-semibold block mb-2">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope inp-icon"></i>
                        <input type="email" id="email" placeholder="you@example.com" class="inp">
                    </div>
                </div>
                <div>
                    <label class="text-gray-400 text-sm font-semibold block mb-2">Password</label>
                    <div class="relative">
                        <i class="fas fa-key inp-icon"></i>
                        <input type="password" id="password" placeholder="••••••••" class="inp">
                        <i class="fas fa-eye" id="togglePassword" onclick="togglePassword('password','togglePassword')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#6b7280;"></i>
                    </div>
                </div>
            </div>

            <button id="loginBtn" class="btn-primary">
                Sign In &nbsp;<i class="fas fa-arrow-right"></i>
            </button>

            <p id="statusMsg" class="text-center text-sm mt-4 min-h-[20px]" style="color:#6b7280;"></p>

            <div class="mt-6 pt-6 text-center" style="border-top:1px solid rgba(255,255,255,0.05);">
                <p class="text-gray-500 text-sm">
                    Don't have an account?
                    <a href="registerpage.html" class="text-blue-400 hover:text-blue-300 font-semibold ml-1 transition-colors">Create one →</a>
                </p>
            </div>
        </div>
    </main>

    <footer class="py-4 text-center text-gray-600 text-sm" style="border-top:1px solid rgba(59,130,246,0.08);">
        <p>Bowen University &copy; 2025</p>
    </footer>

    <script src="config.js"></script>
    <script src="loginpage.js"></script>
    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counsellor Dashboard - Career Guidance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta http-equiv="Content-Security-Policy" content="default-src *; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline';">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background:
                radial-gradient(ellipse at 10% 10%, rgba(59,130,246,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 90%, rgba(59,130,246,0.05) 0%, transparent 50%),
                #080d1a;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .e1 { animation: fadeInUp 0.5s ease both; }
        .e2 { animation: fadeInUp 0.5s 0.1s ease both; }
        .e3 { animation: fadeInUp 0.5s 0.2s ease both; }

        .grad-text {
            background: linear-gradient(135deg, #3b82f6, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Stat cards */
        .stat-card {
            background: linear-gradient(145deg, rgba(18,18,30,0.98), rgba(14,20,36,0.98));
            border: 1px solid rgba(59,130,246,0.18);
            transition: all 0.25s;
        }
        .stat-card:hover {
            border-color: rgba(59,130,246,0.4);
            transform: translateY(-3px);
        }

        /* Tab buttons — JS toggles bg-blue-500 ↔ bg-gray-700 */
        .tab-btn {
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .tab-btn.bg-blue-500 {
            background: #3b82f6 !important;
            color: white !important;
            border-color: transparent !important;
            box-shadow: 0 0 12px rgba(59,130,246,0.3) !important;
        }
        .tab-btn.bg-gray-700 {
            background: rgba(30,32,50,0.8) !important;
            color: #9ca3af !important;
            border-color: rgba(255,255,255,0.07) !important;
        }
        .tab-btn.bg-gray-700:hover {
            background: rgba(59,130,246,0.1) !important;
            color: white !important;
            border-color: rgba(59,130,246,0.2) !important;
        }

        /* Panel card */
        .panel-card {
            background: linear-gradient(145deg, rgba(18,18,30,0.98), rgba(14,20,36,0.98));
            border: 1px solid rgba(59,130,246,0.15);
            border-radius: 16px;
        }

        /* Table header */
        .tbl-head th {
            padding: 10px 16px 10px 0;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        /* Table rows — generated by counsellordashboard.js */
        #bookingsTable tr, #progressTable tr {
            border-bottom: 1px solid rgba(255,255,255,0.04) !important;
            transition: background 0.15s;
        }
        #bookingsTable tr:hover, #progressTable tr:hover {
            background: rgba(59,130,246,0.04) !important;
        }
        #bookingsTable td, #progressTable td {
            padding: 13px 16px 13px 0 !important;
            color: #d1d5db !important;
            font-size: 0.875rem !important;
            vertical-align: top;
        }
        #bookingsTable .text-gray-400, #progressTable .text-gray-400 {
            color: #6b7280 !important;
        }

        /* Logout button */
        .btn-logout {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 7px 16px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-logout:hover {
            background: rgba(59,130,246,0.12);
            border-color: rgba(59,130,246,0.3);
            color: #3b82f6;
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="py-4 px-6" style="background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(59,130,246,0.12);position:sticky;top:0;z-index:50;">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <i class="fas fa-user-tie text-white text-sm"></i>
                </div>
                <div>
                    <p class="font-extrabold text-white text-sm leading-tight">Counsellor Dashboard</p>
                    <p id="counsellorName" class="text-gray-500 text-xs"></p>
                </div>
            </div>
            <button id="logoutBtn" class="btn-logout">
                <i class="fas fa-sign-out-alt mr-1"></i>Sign Out
            </button>
        </div>
    </header>

    <main class="flex-1 px-4 py-8">
        <div class="max-w-6xl mx-auto">

            <!-- Status message -->
            <p id="statusMsg" class="text-gray-500 text-sm mb-4 min-h-[20px]"></p>

            <!-- Stat Cards -->
            <div class="e1 grid grid-cols-2 gap-4 mb-8 max-w-sm">
                <div class="stat-card rounded-2xl p-5 text-center">
                    <div class="w-9 h-9 rounded-xl flex items-center justify-center mx-auto mb-3" style="background:rgba(59,130,246,0.12);">
                        <i class="fas fa-calendar-check text-blue-400 text-sm"></i>
                    </div>
                    <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider mb-1">Bookings</p>
                    <p id="statBookings" class="text-3xl font-black grad-text">—</p>
                </div>
                <div class="stat-card rounded-2xl p-5 text-center">
                    <div class="w-9 h-9 rounded-xl flex items-center justify-center mx-auto mb-3" style="background:rgba(59,130,246,0.12);">
                        <i class="fas fa-users text-blue-400 text-sm"></i>
                    </div>
                    <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider mb-1">Students</p>
                    <p id="statStudents" class="text-3xl font-black grad-text">—</p>
                </div>
            </div>

            <!-- Tabs -->
            <div class="e2 flex gap-2 mb-5">
                <button data-tab="bookings" class="tab-btn bg-blue-500">
                    <i class="fas fa-calendar mr-1.5"></i>Bookings
                </button>
                <button data-tab="progress" class="tab-btn bg-gray-700">
                    <i class="fas fa-chart-line mr-1.5"></i>Student Progress
                </button>
            </div>

            <!-- Bookings Panel -->
            <div id="panelBookings" class="e3 panel-card overflow-x-auto">
                <div class="p-6 pb-2 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:rgba(59,130,246,0.12);">
                        <i class="fas fa-calendar-check text-blue-400 text-sm"></i>
                    </div>
                    <h2 class="font-bold text-white">My Bookings</h2>
                </div>
                <div class="px-6 pb-6">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="tbl-head">
                                <th>Student</th>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Mode</th>
                                <th>Notes</th>
                            </tr>
                        </thead>
                        <tbody id="bookingsTable"></tbody>
                    </table>
                </div>
            </div>

            <!-- Progress Panel -->
            <div id="panelProgress" class="e3 panel-card overflow-x-auto hidden">
                <div class="p-6 pb-2 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:rgba(59,130,246,0.12);">
                        <i class="fas fa-chart-bar text-blue-400 text-sm"></i>
                    </div>
                    <h2 class="font-bold text-white">Student Progress</h2>
                </div>
                <div class="px-6 pb-6">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="tbl-head">
                                <th>Student</th>
                                <th>Track</th>
                                <th>Subjects</th>
                                <th>IQ Score</th>
                                <th>Recommendation</th>
                            </tr>
                        </thead>
                        <tbody id="progressTable"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-4 text-center text-gray-600 text-sm" style="border-top:1px solid rgba(59,130,246,0.08);">
        <p>Bowen University &copy; 2025</p>
    </footer>

    <script src="config.js"></script>
    <script src="counsellordashboard.js"></script>
</body>
</html>

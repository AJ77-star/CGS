<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Results - Career Guidance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta http-equiv="Content-Security-Policy" content="default-src *; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline';">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background:
                radial-gradient(ellipse at 10% 10%, rgba(59,130,246,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 90%, rgba(59,130,246,0.06) 0%, transparent 50%),
                #080d1a;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes glowPulse {
            0%,100% { box-shadow: 0 0 16px rgba(59,130,246,0.3); }
            50%     { box-shadow: 0 0 32px rgba(59,130,246,0.55); }
        }
        .e1 { animation: fadeInUp 0.6s ease both; }
        .e2 { animation: fadeInUp 0.6s 0.1s ease both; }
        .e3 { animation: fadeInUp 0.6s 0.2s ease both; }
        .e4 { animation: fadeInUp 0.6s 0.3s ease both; }

        .grad-text {
            background: linear-gradient(135deg, #3b82f6, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card {
            background: linear-gradient(145deg, rgba(18,18,30,0.98), rgba(14,20,36,0.98));
            border: 1px solid rgba(59,130,246,0.18);
        }

        /* Summary chips */
        .chip {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px 16px;
        }

        /* CLIPS / AI boxes */
        #clipsResult, #aiResult {
            background: rgba(59,130,246,0.06) !important;
            border: 1px solid rgba(59,130,246,0.25) !important;
            border-radius: 14px !important;
            padding: 16px !important;
            margin-bottom: 16px !important;
        }
        #clipsResult p.font-bold, #aiResult p.font-bold {
            color: #93c5fd !important;
            font-size: 0.8rem !important;
            font-weight: 700 !important;
            letter-spacing: 0.06em !important;
            text-transform: uppercase !important;
            margin-bottom: 8px !important;
        }
        #clipsRecommendation, #aiExplanation {
            color: #d1d5db !important;
            font-size: 0.875rem !important;
            line-height: 1.65 !important;
        }

        /* Recommendation items generated by results.js */
        #recommendations > div {
            background: linear-gradient(135deg, rgba(59,130,246,0.07), rgba(14,20,36,0.95)) !important;
            border: 1px solid rgba(59,130,246,0.25) !important;
            border-radius: 12px !important;
            padding: 14px 16px !important;
            margin-bottom: 8px !important;
            transition: all 0.2s !important;
        }
        #recommendations > div:hover {
            border-color: rgba(59,130,246,0.5) !important;
            transform: translateX(4px) !important;
        }
        #recommendations > div p {
            color: white !important;
            font-weight: 600 !important;
            font-size: 0.9rem !important;
        }

        /* Buttons */
        .btn-primary {
            background: #3b82f6;
            animation: glowPulse 2.5s ease-in-out infinite;
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }

        .btn-secondary {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: rgba(59,130,246,0.08);
            border-color: rgba(59,130,246,0.25);
            color: white;
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="py-4 px-6" style="background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(59,130,246,0.12);">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <a href="mainmenu.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-white text-sm font-semibold transition-colors">
                <i class="fas fa-arrow-left text-blue-400"></i> Back
            </a>
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 bg-blue-500 rounded-lg flex items-center justify-center">
                    <i class="fas fa-compass text-white text-xs"></i>
                </div>
                <span class="font-bold text-sm text-white">Your Results</span>
            </div>
            <div style="width:52px;"></div>
        </div>
    </header>

    <main class="flex-1 flex justify-center items-start px-4 py-10">
        <div class="w-full max-w-xl">

            <!-- Hero result header -->
            <div class="e1 text-center mb-8">
                <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background:rgba(59,130,246,0.12);">
                    <i class="fas fa-star text-blue-400 text-2xl"></i>
                </div>
                <h2 class="text-3xl font-black grad-text mb-2">Your Career Path</h2>
                <p class="text-gray-500 text-sm">Based on your quiz results, here are your personalised recommendations.</p>
            </div>

            <!-- Summary chips -->
            <div class="e2 grid grid-cols-3 gap-3 mb-6">
                <div class="chip text-center">
                    <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider mb-1">Track</p>
                    <p id="trackResult" class="text-white font-bold text-sm"></p>
                </div>
                <div class="chip text-center">
                    <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider mb-1">Subjects</p>
                    <p id="subjectsResult" class="text-white font-bold text-xs leading-tight"></p>
                </div>
                <div class="chip text-center">
                    <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider mb-1">Aptitude</p>
                    <p class="text-white font-bold"><span id="iqResult"></span><span class="text-gray-500 text-xs">/5</span></p>
                </div>
            </div>

            <!-- CLIPS result (hidden until populated by results.js) -->
            <div class="e3" id="clipsResult" class="hidden">
                <p class="font-bold">Top Recommendation</p>
                <p id="clipsRecommendation"></p>
            </div>

            <!-- AI explanation (hidden until populated) -->
            <div class="e3" id="aiResult" class="hidden">
                <p class="font-bold">AI Guidance</p>
                <p id="aiExplanation"></p>
                <p id="aiSource" style="font-size:0.7rem;color:#6b7280;margin-top:6px;"></p>
            </div>

            <!-- Career paths -->
            <div class="e4">
                <p class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-3">Recommended Career Paths</p>
                <div id="recommendations"></div>
            </div>

            <!-- Action buttons -->
            <div class="e4 flex flex-col gap-3 mt-8">
                <button id="menuBtn" class="btn-primary">
                    <i class="fas fa-home mr-2"></i>Back to Dashboard
                </button>
                <button id="retakeBtn" class="btn-secondary">
                    <i class="fas fa-redo mr-2"></i>Retake Quiz
                </button>
            </div>

        </div>
    </main>

    <footer class="py-4 text-center text-gray-600 text-sm" style="border-top:1px solid rgba(59,130,246,0.08);">
        <p>Bowen University &copy; 2025</p>
    </footer>

    <script src="config.js"></script>
    <script src="results.js"></script>
</body>
</html>
